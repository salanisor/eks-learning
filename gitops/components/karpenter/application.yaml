apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.10.0
    helm:
      values: |
        serviceAccount:
          name: karpenter
        settings:
          clusterName: eks-learning
          clusterEndpoint: https://8B12B9EFBA612DA58E81ECAE755AD889.gr7.us-east-1.eks.amazonaws.com
          interruptionQueue: eks-learning-karpenter-interruption
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
