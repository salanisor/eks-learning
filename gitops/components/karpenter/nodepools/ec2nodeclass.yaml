apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2023@latest
  role: eks-learning-node-role
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning
  tags:
    Environment: dev
    ManagedBy: karpenter
    Project: eks-learning
