apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: workload
spec:
  template:
    metadata:
      labels:
        node-type: workload
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3.large", "t3.xlarge", "t3a.medium", "t3a.large"]
  disruption:
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30m
    budgets:
      - nodes: "10%"
  limits:
    cpu: 100
    memory: 200Gi
