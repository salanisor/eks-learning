# Least-privilege role for test-app pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: test-app-role
  namespace: test-app
rules:
  # Read configmaps — app config
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Read own pod info — health checks, metadata
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read secrets — only if app needs them directly
  # Remove this if using Secrets Manager CSI (Week 12)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]